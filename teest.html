<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>登入頁面</title>

<style>

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#f2f2f2;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    background:#333;
    color:white;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:#555;
}

#error{
    color:red;
    margin-top:10px;
    text-align:center;
}

</style>
</head>

<body>

<div class="login-box">

    <h2>登入</h2>

    <input type="text" id="username" placeholder="帳號">

    <input type="password" id="password" placeholder="密碼">

    <button onclick="login()">
        登入
    </button>

    <div id="error"></div>

</div>

<script>

function login(){

    // 正確帳密
    const correctUsername = "30678";
    const correctPassword = "30678";

    // 使用者輸入
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    // 驗證
    if(username === correctUsername && password === correctPassword){

        alert("登入成功！");

        // 跳轉頁面
        window.location.href = "home.html";

    }else{

        document.getElementById("error").innerText = "帳號或密碼錯誤";

    }

}

</script>

</body>
</html>
