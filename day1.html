
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福岡九州自由行 - DAY 1</title>
    <link rel="stylesheet" href="day1.css">
</head>
<body>

<div class="container">
    <header>
        <span class="tag">9天8夜北九州之旅</span>
        <h1>DAY 1 抵達博多與屋台體驗</h1>
    </header>

    <div class="card">
        <div class="card-header">
            <span class="time">13:30</span>
            <div class="dot"></div>
        </div>
        <h2>高雄機場集合</h2>
        <p></p>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="time">15:30-19:20</span>
            <div class="dot"></div>
        </div>
        <h2>高雄-福岡</h2>
        <img src="ticket.png">
      
    </div>

    <div class="card">
        <div class="card-header">
            <span class="time">21:24-22:44</span>
            <div class="dot"></div>
        </div>
        <h2>博多-鹿兒島</h2>
        <p>入住博多車站周邊飯店，辦理入住手續並稍作休息，為晚上的行程充電。</p>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="time">16:30 - 18:30</span>
            <div class="dot"></div>
        </div>
        <h2>博多運河城散策</h2>
        <p>步行或搭車前往博多運河城購物，欣賞定時演出的音樂水舞秀，順便逛逛當地的限定商店。</p>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="time">19:00 - 21:30</span>
            <div class="dot"></div>
        </div>
        <h2>中洲屋台體驗與晚餐</h2>
        <p>漫步至那珂川沿岸的中洲屋台街，體驗道地的日本路邊攤文化，品嚐博多豚骨拉麵、烤雞肉串與明太子料理。</p>
    </div>
</div>

</body>
</html>
