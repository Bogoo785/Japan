<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單  數字和日期</title>
    
</head>
<body>
<h1>日本旅遊</h1> 
<form action="http://www.yahoo.com.tw">
    <label for="date">出發的日期</label>
    <input type="date" name="date" id="date">
    <br>
    <label for="day">停留天數</label>
    <input type="number" name="day" id="day" min="1" max="10">
    <br>
    <input type="submit" value="提交">



</form>   
</body>
</html>
